    <path stroke="#1e3a8a" stroke-width="2.5" stroke-linecap="round" d="M22 26h20M22 34h20M22 42h12"/>
    <path fill="#1e3a8a" d="M18 24h5v5h-5zm0 8h5v5h-5zm0 8h5v5h-5z"/>
    <path stroke="#fff" stroke-width="2" stroke-linecap="round" d="m20 26.5 1.5 1.5 3-3m0 8 1.5 1.5 3-3m0 8 1.5 1.5 3-3"/>
  </symbol>

  <!-- Licenses -->
  <symbol id="ic-car" viewBox="0 0 64 64">
    <path fill="url(#g-red)" d="M8 38 14 22h36l6 16v10H8V38Zm6 14h8v-6h28v6h8v-8H14v8Z"/>
    <circle cx="20" cy="44" r="5" fill="#450a0a"/><circle cx="44" cy="44" r="5" fill="#450a0a"/>
    <circle cx="20" cy="44" r="2.5" fill="#fca5a5"/><circle cx="44" cy="44" r="2.5" fill="#fca5a5"/>
    <path fill="#fff" opacity=".3" d="M16 26h32l4 10H12l4-10Z"/>
  </symbol>
  <symbol id="ic-moto" viewBox="0 0 64 64">
    <circle cx="16" cy="46" r="9" fill="url(#g-purple)"/><circle cx="48" cy="46" r="9" fill="url(#g-purple)"/>
    <circle cx="16" cy="46" r="4" fill="#2e1065"/><circle cx="48" cy="46" r="4" fill="#2e1065"/>
