  <!-- Stat sidebar icons -->
  <symbol id="ic-stat-phone" viewBox="0 0 64 64"><rect x="18" y="8" width="28" height="48" rx="5" fill="url(#g-cyan)"/><circle cx="32" cy="48" r="3" fill="#164e63"/></symbol>
  <symbol id="ic-stat-job" viewBox="0 0 64 64">
