<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 720" fill="none">
  <defs>
    <linearGradient id="jacket" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#a67c52"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffb800"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-10%" width="140%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- legs -->
    <path d="M118 420 L108 680 L138 680 L148 430 Z" fill="#111827"/>
    <path d="M202 420 L212 680 L182 680 L172 430 Z" fill="#111827"/>
  </g>
  <!-- torso suit -->
  <path d="M95 255 Q160 220 225 255 L240 420 Q160 450 80 420 Z" fill="url(#jacket)"/>
  <path d="M130 265 L160 290 L190 265 L185 400 L160 415 L135 400 Z" fill="url(#shirt)"/>
  <path d="M152 310 H168 V395 H152 Z" fill="url(#gold)" opacity="0.9"/>
  <!-- arms -->
  <path d="M92 270 L55 360 L72 375 L108 285 Z" fill="url(#jacket)"/>
  <path d="M228 270 L265 350 L248 365 L212 285 Z" fill="url(#jacket)"/>
  <!-- rifle -->
  <rect x="248" y="300" width="58" height="12" rx="3" fill="#1f2937" transform="rotate(18 248 300)"/>
  <rect x="295" y="292" width="28" height="8" rx="2" fill="#374151" transform="rotate(18 295 292)"/>
  <!-- head -->
  <ellipse cx="160" cy="195" rx="48" ry="54" fill="url(#skin)"/>
  <path d="M112 175 Q160 125 208 175 Q215 205 205 225 Q160 200 115 225 Q105 205 112 175 Z" fill="#1a1025"/>
  <!-- sunglasses -->
  <rect x="128" y="182" width="30" height="12" rx="3" fill="#0a0a0a"/>
  <rect x="162" y="182" width="30" height="12" rx="3" fill="#0a0a0a"/>
  <path d="M158 188 H162" stroke="#ffb800" stroke-width="2"/>
</svg>
