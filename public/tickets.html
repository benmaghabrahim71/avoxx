<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#040406" />
  <title>Avox Roleplay — Tickets</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="ucp-mode">
  <main class="container ucp-subpage ucp-shell">
    <div class="grid grid-2 rise rise-1">
      <div class="ucp-panel">
        <h3>Submit a new ticket</h3>
        <form id="ticketForm" class="form">
          <div id="msg"></div>
          <div class="field">
            <label>Type</label>
            <select name="kind">
              <option value="report">Player report</option>
              <option value="appeal">Ban appeal</option>
              <option value="bug">Bug report</option>
              <option value="question">Question</option>
            </select>
          </div>
          <div class="field">
            <label>Subject</label>
            <input name="subject" maxlength="140" placeholder="Short summary…" required />
          </div>
          <div class="field">
            <label>Details</label>
            <textarea name="body" rows="6" placeholder="Describe what happened, include times, players, evidence…" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Submit ticket</button>
        </form>
      </div>

      <div class="ucp-panel">
        <h3>Your tickets</h3>
        <div id="list" style="display:flex;flex-direction:column;gap:10px;max-height:520px;overflow:auto;">
          <div class="skel" style="height:60px;"></div>
          <div class="skel" style="height:60px;"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/common.js"></script>
  <script>
    (async () => {
      await Avox.runUcpPage({ active: 'tickets', title: 'Tickets & Support' }, () => {
        load();
        document.getElementById('ticketForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const msg = document.getElementById('msg');
        msg.innerHTML = '';
        try {
          await Avox.api('/api/tickets', {
            method: 'POST',
            body: JSON.stringify({
              kind:    fd.get('kind'),
              subject: fd.get('subject'),
              body:    fd.get('body'),
            }),
          });
          e.target.reset();
          msg.innerHTML = '<div class="alert-success">Ticket submitted. Our staff will review it shortly.</div>';
          Avox.toast('Ticket submitted', 'success');
          load();
        } catch (err) {
          msg.innerHTML = `<div class="alert-error">${Avox.esc(err.message)}</div>`;
        }
      });
      });
    })();

    async function load() {
      const list = document.getElementById('list');
      try {
        const { rows } = await Avox.api('/api/tickets/me');
        if (!rows.length) {
          list.innerHTML = '<div class="muted">No tickets yet.</div>'; return;
        }
        list.innerHTML = rows.map((t) => `
          <div class="ticket-item">
            <div class="flex-between" style="margin-bottom:6px;">
              <b>${Avox.esc(t.subject)}</b>
              <span class="tag ${t.status === 'open' ? 'tag-temp' : 'tag-good'}">${Avox.esc(t.status)}</span>
            </div>
            <div class="muted" style="font-size:12px;margin-bottom:8px;">
              ${Avox.esc(t.kind)} · ${Avox.esc(Avox.fmtRelative(t.created))}
            </div>
            <div style="color:var(--text-soft);font-size:13px;white-space:pre-wrap;">${Avox.esc(t.body)}</div>
            ${t.reply ? `<div class="ticket-reply">
              <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-dim);margin-bottom:4px;">
                Reply from ${Avox.esc(t.handled_by || 'staff')}
              </div>
              ${Avox.esc(t.reply)}
            </div>` : ''}
          </div>
        `).join('');
      } catch (e) {
        list.innerHTML = `<div class="alert-error">${Avox.esc(e.message)}</div>`;
      }
    }
  </script>
</body>
</html>
