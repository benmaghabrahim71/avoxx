    <rect x="27" y="24" width="10" height="30" rx="2" fill="url(#g-gold)"/>
    <rect x="44" y="14" width="10" height="40" rx="2" fill="url(#g-purple)"/>
  </symbol>
  <symbol id="ic-dock-roulette" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="28" fill="url(#g-purple)"/>
    <circle cx="32" cy="32" r="10" fill="#1e1b2e"/>
    <path stroke="#1e1b2e" stroke-width="2" d="M32 4v56M4 32h56"/>
    <circle cx="32" cy="32" r="4" fill="url(#g-gold)"/>
  </symbol>
  <symbol id="ic-dock-settings" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="10" fill="url(#g-cyan)"/>
    <path fill="url(#g-cyan)" d="M32 6v8M32 50v8M6 32h8M50 32h8M13 13l5.5 5.5M45.5 45.5 51 51M51 13l-5.5 5.5M18.5 45.5 13 51"/>
  </symbol>
  <symbol id="ic-dock-shop" viewBox="0 0 64 64">
    <path fill="url(#g-gold)" d="M10 18h44l-4 36H14L10 18Zm6 0 4-8h24l4 8"/>
    <circle cx="24" cy="50" r="4" fill="#78350f"/><circle cx="42" cy="50" r="4" fill="#78350f"/>
