<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#040406" />
  <title>Avox Roleplay — Player</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <main class="container">
    <div class="card rise" style="margin-bottom:18px;">
      <div class="flex" style="gap:10px;">
        <input id="searchInput" type="search" placeholder="Search any player by username…" style="flex:1;padding:11px 14px;background:rgba(255,255,255,0.025);color:var(--text);border:1px solid var(--border-2);border-radius:10px;font-size:14px;font-family:inherit;" />
        <button class="btn btn-primary" id="searchBtn">Search</button>
      </div>
      <div id="suggestions" style="margin-top:10px;display:flex;flex-direction:column;gap:6px;"></div>
    </div>

    <div id="root"><div class="card muted">Search for a player by name to view their public profile.</div></div>
  </main>

  <script src="/js/common.js"></script>
  <script>
    Avox.mountPage({ active: 'leaderboard', eyebrow: 'Citizen profile', title: 'Player lookup', hint: 'Search any registered character.' });

    const params = new URLSearchParams(location.search);
    const initialUser = params.get('u');
    if (initialUser) {
      document.getElementById('searchInput').value = initialUser;
      loadProfile(initialUser);
    }

    document.getElementById('searchBtn').onclick = () => go();
    document.getElementById('searchInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') go();
    });

    let suggT;
    document.getElementById('searchInput').addEventListener('input', (e) => {
      clearTimeout(suggT);
      const q = e.target.value.trim();
      if (q.length < 2) { document.getElementById('suggestions').innerHTML = ''; return; }
      suggT = setTimeout(async () => {
        try {
          const { rows } = await Avox.api('/api/players?q=' + encodeURIComponent(q));
          const root = document.getElementById('suggestions');
          if (!rows.length) { root.innerHTML = ''; return; }
          root.innerHTML = rows.map((r) => `
            <a href="/player?u=${encodeURIComponent(r.username)}" class="flex" style="padding:8px 12px;background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:8px;text-decoration:none;color:var(--text);gap:10px;">
              <span class="av av-grad-${Avox.avGrad(r.username)}" style="width:24px;height:24px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:10px;">${Avox.esc(Avox.initials(r.username))}</span>
              <b>${Avox.esc(r.username)}</b>
              <span class="muted" style="margin-left:auto;font-size:12px;">Lvl ${r.level} · ${Avox.fmtNum(r.hours)}h</span>
            </a>
          `).join('');
        } catch (_) {}
      }, 250);
    });

    function go() {
      const name = document.getElementById('searchInput').value.trim();
      if (!name) return;
      history.replaceState(null, '', '/player?u=' + encodeURIComponent(name));
      loadProfile(name);
    }

    async function loadProfile(name) {
      const root = document.getElementById('root');
      root.innerHTML = '<div class="card"><div class="skel" style="height:120px;"></div></div>';
      try {
        const { player, factionName, gangName, bans } = await Avox.api('/api/players/' + encodeURIComponent(name));
        root.innerHTML = `
          <div class="profile-hero rise">
            <div class="avatar-xl av-grad-${Avox.avGrad(player.username)}">${Avox.esc(Avox.initials(player.username))}</div>
            <div style="flex:1;">
              <div style="font-family:var(--font-disp);font-size:28px;font-weight:700;background:linear-gradient(180deg,#fff,#cdd5e0);-webkit-background-clip:text;background-clip:text;color:transparent;">
                ${Avox.esc(player.username)}
              </div>
              <div class="muted" style="margin-top:4px;font-size:13px;">
                Member since ${Avox.fmtDate(player.regdate)} · Last seen ${Avox.fmtRelative(player.lastlogin)}
              </div>
              <div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;">
                ${player.adminlevel > 0  ? `<span class="tag tag-admin">Admin · L${player.adminlevel}</span>` : ''}
                ${player.helperlevel > 0 ? `<span class="tag tag-good">Helper · L${player.helperlevel}</span>` : ''}
                ${player.vippackage > 2  ? `<span class="tag tag-vip">VIP · P${player.vippackage}</span>` : ''}
                ${factionName            ? `<span class="tag tag-faction">${Avox.esc(factionName)}</span>` : ''}
                ${gangName               ? `<span class="tag tag-perm">${Avox.esc(gangName)}</span>` : ''}
                ${player.locked          ? `<span class="tag tag-perm">Locked</span>` : ''}
              </div>
            </div>
          </div>
          <div class="spacer"></div>
          <div class="grid grid-4 rise rise-1">
            <div class="stat"><div class="head">Level</div><div class="value">${player.level}</div><div class="hint">${Avox.fmtNum(player.exp)} XP</div></div>
            <div class="stat"><div class="head">Hours</div><div class="value">${Avox.fmtNum(player.hours)}h</div><div class="hint">Time played</div></div>
            <div class="stat"><div class="head">Skin</div><div class="value">#${player.skin}</div><div class="hint">Avatar id</div></div>
            <div class="stat"><div class="head">Bans</div><div class="value">${bans.length}</div><div class="hint">${bans.filter((b) => b.permanent).length} permanent</div></div>
          </div>
          ${bans.length ? `
            <div class="spacer"></div>
            <div class="card rise rise-2">
              <h3 style="margin-top:0;">Ban history</h3>
              <div class="table-wrap">
                <table>
                  <thead><tr><th>Date</th><th>By</th><th>Reason</th><th>Type</th></tr></thead>
                  <tbody>${bans.map((b) => `<tr>
                    <td class="muted">${Avox.esc(Avox.fmtDate(b.date))}</td>
                    <td>${Avox.esc(b.bannedby || '—')}</td>
                    <td class="muted" style="max-width:300px;">${Avox.esc(b.reason || '—')}</td>
                    <td>${b.permanent ? '<span class="tag tag-perm">Permanent</span>' : '<span class="tag tag-temp">Temporary</span>'}</td>
                  </tr>`).join('')}</tbody>
                </table>
              </div>
            </div>` : ''}
        `;
      } catch (e) {
        root.innerHTML = `<div class="card alert-error">${Avox.esc(e.message)}</div>`;
      }
    }
  </script>
</body>
</html>
