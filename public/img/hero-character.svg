<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 720" fill="none">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#b8956a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- ambient glow -->
  <ellipse cx="240" cy="680" rx="120" ry="24" fill="rgba(0,0,0,0.5)" filter="url(#glow)"/>
  <ellipse cx="240" cy="360" rx="160" ry="200" fill="rgba(124,58,237,0.15)"/>
  <!-- legs -->
  <path d="M195 420 L175 680 L210 680 L230 440 Z" fill="url(#body)"/>
  <path d="M285 420 L305 680 L270 680 L250 440 Z" fill="url(#body)"/>
  <!-- torso / jacket -->
  <path d="M160 280 Q240 240 320 280 L340 420 Q240 450 140 420 Z" fill="url(#body)" stroke="url(#accent)" stroke-width="2"/>
  <!-- arms -->
  <path d="M155 290 L100 380 L125 395 L175 310 Z" fill="url(#body)"/>
  <path d="M325 290 L380 370 L355 385 L305 310 Z" fill="url(#body)"/>
  <!-- head -->
  <ellipse cx="240" cy="200" rx="52" ry="58" fill="url(#skin)"/>
  <!-- hair -->
  <path d="M188 175 Q240 120 292 175 Q300 210 285 230 Q240 200 195 230 Q180 210 188 175 Z" fill="#1a1025"/>
  <!-- sunglasses -->
  <rect x="200" y="188" width="36" height="14" rx="4" fill="#0f0a18" opacity="0.9"/>
  <rect x="244" y="188" width="36" height="14" rx="4" fill="#0f0a18" opacity="0.9"/>
  <path d="M236 195 H244" stroke="#7c3aed" stroke-width="2"/>
  <!-- chain -->
  <path d="M220 250 Q240 270 260 250" stroke="url(#accent)" stroke-width="3" fill="none"/>
  <!-- phone in hand -->
  <rect x="88" y="360" width="28" height="48" rx="6" fill="#111" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="92" y="368" width="20" height="32" rx="2" fill="rgba(124,58,237,0.4)"/>
</svg>
