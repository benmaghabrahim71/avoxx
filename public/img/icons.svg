  <!-- Feature cards -->
  <symbol id="ic-house" viewBox="0 0 64 64">
    <path fill="url(#g-purple)" d="M10 30 32 10l22 20v22a3 3 0 0 1-3 3H36V44H28v11H13a3 3 0 0 1-3-3V30Z"/>
    <path fill="#fff" opacity=".25" d="M28 44h8v11h-8z"/>
    <rect x="26" y="32" width="12" height="10" rx="1" fill="#1e1b2e"/>
  </symbol>
  <symbol id="ic-briefcase" viewBox="0 0 64 64">
    <rect x="10" y="24" width="44" height="28" rx="5" fill="url(#g-green)"/>
    <path fill="#064e3b" d="M24 24v-7a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v7"/>
    <rect x="28" y="36" width="8" height="8" rx="2" fill="#022c22"/>
  </symbol>
  <symbol id="ic-star" viewBox="0 0 64 64">
    <path fill="url(#g-gold)" filter="url(#glow)" d="m32 8 8 18 20 2-14 13 4 20-18-10-18 10 4-20L4 28l20-2 8-18Z"/>
  </symbol>
  <symbol id="ic-tasks" viewBox="0 0 64 64">
