  <symbol id="ic-coin" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="26" fill="url(#g-gold)" filter="url(#glow)"/>
    <circle cx="32" cy="32" r="18" fill="none" stroke="#78350f" stroke-width="2.5"/>
    <text x="32" y="40" text-anchor="middle" font-size="22" font-weight="800" fill="#78350f">₵</text>
  </symbol>
  <symbol id="ic-cash" viewBox="0 0 64 64">
