    <path stroke="url(#g-red)" stroke-width="6" stroke-linecap="round" d="M14 14l36 36"/>
  </symbol>
  <symbol id="ic-vip" viewBox="0 0 64 64">
    <path fill="url(#g-gold)" d="M8 24h48l-6 32H14L8 24Zm6 0 6 12 12-16 12 16 6-12 6 12H14Z"/>
  </symbol>

  <!-- Promo -->
  <symbol id="ic-roulette" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="28" fill="url(#g-purple)"/>
    <circle cx="32" cy="32" r="10" fill="#1e1b2e"/>
    <path stroke="#1e1b2e" stroke-width="2" d="M32 4v56M4 32h56M10 10l44 44M54 10 10 54"/>
