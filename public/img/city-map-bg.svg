<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#030508"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="rgba(124,58,237,0.12)" stroke-width="0.8"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.6"/>
  <!-- stylized city blocks -->
  <g opacity="0.55" stroke="rgba(6,182,212,0.25)" stroke-width="1.2">
    <rect x="120" y="520" width="140" height="90" rx="4" fill="rgba(124,58,237,0.08)"/>
    <rect x="280" y="480" width="90" height="130" rx="4" fill="rgba(6,182,212,0.06)"/>
    <rect x="390" y="540" width="160" height="70" rx="4" fill="rgba(124,58,237,0.07)"/>
    <rect x="580" y="450" width="110" height="160" rx="4" fill="rgba(168,85,247,0.08)"/>
    <rect x="720" y="500" width="200" height="110" rx="4" fill="rgba(6,182,212,0.05)"/>
    <rect x="960" y="470" width="130" height="140" rx="4" fill="rgba(124,58,237,0.09)"/>
    <rect x="1120" y="530" width="180" height="80" rx="4" fill="rgba(6,182,212,0.06)"/>
    <rect x="1340" y="490" width="100" height="120" rx="4" fill="rgba(168,85,247,0.07)"/>
  </g>
  <!-- roads -->
  <path d="M0 620 H1600 M800 0 V900 M400 0 V900 M1200 0 V900" stroke="rgba(255,255,255,0.04)" stroke-width="3"/>
  <circle cx="800" cy="420" r="180" stroke="rgba(124,58,237,0.2)" stroke-width="1.5" stroke-dasharray="8 12"/>
  <circle cx="800" cy="420" r="280" stroke="rgba(6,182,212,0.12)" stroke-width="1"/>
</svg>
