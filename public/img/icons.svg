  <symbol id="ic-stat-faction" viewBox="0 0 64 64">
    <path fill="url(#g-blue)" d="M32 8 10 18v16c0 14 9.5 26 22 30 12.5-4 22-16 22-30V18L32 8Z"/>
  </symbol>
  <symbol id="ic-stat-time" viewBox="0 0 64 64"><circle cx="32" cy="32" r="24" fill="none" stroke="url(#g-gold)" stroke-width="4"/><path stroke="url(#g-gold)" stroke-width="4" stroke-linecap="round" d="M32 16v16l10 6"/></symbol>
  <symbol id="ic-stat-level" viewBox="0 0 64 64"><path fill="url(#g-gold)" d="M32 6 38 22h16l-13 10 5 16-16-11-16 11 5-16L10 22h16l6-16Z"/></symbol>
